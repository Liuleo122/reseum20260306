<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柳立哲 | 個人履歷 - 亞洲大學</title>
    <style>
        :root {
            --primary-color: #005a92; 
            --secondary-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            color: #2c3e50;
            min-height: 100vh;
        }

        .resume-card {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .resume-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 10px;
            background: var(--primary-color);
        }

        .profile-photo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-photo {
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            background-color: #eee; /* 圖片載入前的底色 */
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: var(--primary-color);
        }

        .contact-info {
            color: #555;
            font-size: 1rem;
            line-height: 1.8;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        section { margin-bottom: 25px; }

        h2 {
            font-size: 1.3rem;
            color: var(--primary-color);
            border-left: 5px solid var(--secondary-color);
            padding-left: 12px;
            margin-bottom: 15px;
        }

        .info-list { list-style: none; padding: 0; }
        .info-list li {
            padding: 10px 0;
            border-bottom: 1px dashed #ddd;
        }

        .skill-tag {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 5px;
        }

        .footer-action {
            text-align: center;
            margin-top: 20px;
        }

        #action-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="resume-card">
        <header>
            <div class="profile-photo-container">
                <img src="images/27396.jpg?v=1" alt="柳立哲的照片" class="profile-photo">
            </div>

            <h1>柳立哲</h1>
            <div class="contact-info">
                <div><strong>亞洲大學 Asia University</strong></div>
                <div>學號：AU114022058</div>
                <div>📞 電話：0902-172-126</div>
                <div>✉️ 信箱：liuleo951113@gmail.com</div>
            </div>
        </header>

        <div class="grid-container">
            <div class="left-col">
                <section>
                    <h2>教育背景</h2>
                    <ul class="info-list">
                        <li><strong>亞洲大學</strong></li>
                        <li>資訊工程相關專業 (在學中)</li>
                    </ul>
                </section>
                <section>
                    <h2>關於我</h2>
                    <p>你好，我是立哲！目前就讀於亞洲大學。我對程式開發充滿好奇心，喜歡透過程式碼解決生活中的問題，並持續學習網頁技術與 Git 版本控制。</p>
                </section>
            </div>

            <div class="right-col">
                <section>
                    <h2>專業技能</h2>
                    <div>
                        <span class="skill-tag">HTML / CSS</span>
                        <span class="skill-tag">JavaScript</span>
                        <span class="skill-tag">Git / GitHub</span>
                        <span class="skill-tag">Python</span>
                        <span class="skill-tag">問題分析</span>
                    </div>
                </section>
                <section>
                    <h2>自我期許</h2>
                    <p>希望能將在亞大所學的理論與實務結合，開發出兼具美感與實用性的網頁應用程式。</p>
                </section>
            </div>
        </div>

        <div class="footer-action">
            <button id="action-btn">與我聯繫</button>
        </div>
    </div>

    <script>
        document.getElementById('action-btn').addEventListener('click', () => {
            alert('感謝查看！聯絡信箱：liuleo951113@gmail.com');
        });
    </script>

</body>
</html>
